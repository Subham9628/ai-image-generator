# ============================================
# APPLICATION NAME
# ============================================
spring.application.name=ai-image-generator

# ============================================
# SERVER CONFIGURATION
# ============================================
server.port=8080

# ============================================
# MYSQL DATABASE CONFIGURATION
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/aimedia?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ============================================
# JPA / HIBERNATE CONFIGURATION
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
#spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true



# ============================================
# LOGGING CONFIGURATION (helps debugging)
# ============================================
logging.level.com.example.aimedia=DEBUG
